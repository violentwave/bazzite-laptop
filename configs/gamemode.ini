# GameMode advanced config for Acer Predator G3-571 (GTX 1060)
# Deploy to: /etc/gamemode.ini
# Renices game process, sets NVIDIA GPU to max performance, sends notifications.

[general]
renice=10

[gpu]
apply_gpu_optimisations=accept-responsibility
nv_powermizer_mode=1

[custom]
start=notify-send "GameMode" "Optimizations activated"
end=notify-send "GameMode" "Optimizations deactivated"

[start]
command0=systemctl --user set-property bazzite-llm-proxy.service CPUWeight=10 MemoryHigh=80M
command1=systemctl --user set-property bazzite-mcp-bridge.service CPUWeight=10 MemoryHigh=80M

[end]
command0=systemctl --user set-property bazzite-llm-proxy.service CPUWeight=80 MemoryHigh=100M
command1=systemctl --user set-property bazzite-mcp-bridge.service CPUWeight=80 MemoryHigh=100M
