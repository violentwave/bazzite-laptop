# LiteLLM Provider Routing Config
# Used by ai/router.py to route LLM calls to the best available provider.
# Keys are loaded at runtime from ~/.config/bazzite-ai/keys.env via python-dotenv.
#
# Provider priority (per task type): Gemini → Groq → Mistral → OpenRouter → z.ai → Cerebras
# Router V2 health-weighted selection may reorder based on success rate + latency.
# g4f is DISABLED — privacy risk, all providers below have free tiers.

model_list:
  # ── INTERACTIVE (speed-first, Gemini preferred for tool calling) ──
  - model_name: "fast"
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: "fast"
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: "fast"
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
  - model_name: "fast"
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: "fast"
    litellm_params:
      model: openai/GLM-4.7-Flash
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/paas/v4
  - model_name: "fast"
    litellm_params:
      model: openai/GLM-4.5-Air
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/paas/v4
  - model_name: "fast"
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # ── DEEP ANALYSIS (reasoning-first) ──
  - model_name: "reason"
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: "reason"
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: "reason"
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY
  - model_name: "reason"
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: "reason"
    litellm_params:
      model: openai/GLM-5
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/paas/v4
  - model_name: "reason"
    litellm_params:
      model: openai/GLM-4.7
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/paas/v4

  # ── BATCH (volume-first) ──
  - model_name: "batch"
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: "batch"
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: "batch"
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY
  - model_name: "batch"
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: "batch"
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # ── CODING (code-specialized models) ──
  - model_name: "code"
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: "code"
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: "code"
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY
  - model_name: "code"
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: "code"
    litellm_params:
      model: openai/GLM-4-32B-0414-128K
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/coding/paas/v4

  # ── EMBEDDINGS (local-first) ──
  - model_name: "embed"
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434
  - model_name: "embed"
    litellm_params:
      model: mistral/mistral-embed
      api_key: os.environ/MISTRAL_API_KEY

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 0
  timeout: 30
  allowed_fails: 1

# Health tracking (Router V2)
health_settings:
  failure_threshold: 3
  base_cooldown_s: 300
  max_cooldown_s: 1800
