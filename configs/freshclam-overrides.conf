# freshclam config overrides — update signatures every 4 hours
# DO NOT replace /etc/freshclam.conf with this file!
# Instead, after reboot, read the existing /etc/freshclam.conf and only
# add or change the Checks, UpdateLogFile, and DatabaseMirror lines below.
# The existing file contains other required settings (DatabaseOwner, etc.)
# that must be preserved.

# Check for new signatures 6 times per day (every 4 hours)
Checks 6

# Log updates to the clamav-scans log directory
UpdateLogFile /var/log/clamav-scans/freshclam.log

# Standard mirror
DatabaseMirror database.clamav.net
