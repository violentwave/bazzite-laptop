# clamd configuration for on-demand scanning
# Deploy to: /etc/clamd.d/scan.conf
# Used by: systemctl start clamd@scan → clamdscan
# Pattern: start daemon → scan → stop daemon (reclaim ~1.1GB RAM)

# Comment out Example to enable clamd
# Example

LocalSocket /run/clamd.scan/clamd.sock
User clamscan
ConcurrentDatabaseReload no
ExitOnOOM yes
MaxThreads 8

LogFile /var/log/clamav-scans/clamd.log
LogFileMaxSize 2M
LogTime yes

# Exclusions (clamdscan ignores --exclude-dir, must be in config)
ExcludePath ^/home/lch/\.cache
ExcludePath ^/home/lch/\.local/share/Steam/steamapps/shadercache
ExcludePath ^/home/lch/security/quarantine
ExcludePath ^/proc
ExcludePath ^/sys
ExcludePath ^/dev
ExcludePath ^/run
