# MCP Bridge Tool Allowlist
# Static tool definitions for the MCP bridge server.
# Unknown tool names are rejected at startup. No dynamic registration.
#
# Security model: all tools are read-only, no mutations.
# Arguments validated by regex/length/membership before execution.

tools:
  system.disk_usage:
    description: "Disk usage summary"
    command: ["df", "-h"]
    args: null

  system.cpu_temps:
    description: "CPU and sensor temperatures (JSON)"
    command: ["sensors", "-j"]
    args: null

  system.gpu_status:
    description: "NVIDIA GPU name, temperature, memory, power"
    command: ["nvidia-smi", "--query-gpu=name,temperature.gpu,utilization.gpu,memory.total,power.draw,fan.speed", "--format=csv,noheader,nounits"]
    args: null

  system.memory_usage:
    description: "System memory usage"
    command: ["free", "-h"]
    args: null

  system.uptime:
    description: "System uptime"
    command: ["uptime"]
    args: null

  system.service_status:
    description: "Status of security-related systemd services"
    command: ["systemctl", "show", "--property=Id,ActiveState", "clamav-freshclam", "system-health.timer", "bazzite-mcp-bridge.service", "bazzite-llm-proxy.service"]
    args: null

  security.last_scan:
    description: "Last 20 lines of latest ClamAV scan log"
    source: file_tail
    path: "/var/log/clamav-scans"
    pattern: "scan-*.log"
    lines: 20
    args: null

  security.health_snapshot:
    description: "Last 30 lines of latest health snapshot"
    source: file_tail
    path: "/var/log/system-health"
    pattern: "health-*.log"
    lines: 30
    args: null

  security.status:
    description: "Current security/health status (filtered JSON)"
    source: json_file
    path_key: STATUS_FILE
    allowed_keys:
      - state
      - scan_type
      - last_scan_time
      - result
      - health_status
      - health_issues
    args: null

  security.threat_lookup:
    description: "Look up a file hash in threat intel sources"
    source: python
    module: "ai.threat_intel.lookup"
    args:
      hash:
        type: string
        pattern: "^[a-fA-F0-9]{32,64}$"
        required: true

  security.ip_lookup:
    description: "IP reputation lookup (AbuseIPDB + GreyNoise + Shodan)"
    source: python
    module: "ai.threat_intel.ip_lookup"
    args:
      ip:
        type: string
        pattern: "^[0-9a-fA-F.:]+$"
        max_length: 45
        required: true

  security.url_lookup:
    description: "URL/IOC threat lookup (URLhaus + ThreatFox + CIRCL)"
    source: python
    module: "ai.threat_intel.ioc_lookup"
    args:
      url:
        type: string
        max_length: 2048
        required: true

  knowledge.rag_query:
    description: "Query the security knowledge base (embedding-only, no LLM)"
    source: python
    module: "ai.rag.query"
    args:
      query:
        type: string
        max_length: 500
        required: true

  knowledge.rag_qa:
    description: "Answer a question using the security knowledge base with LLM synthesis"
    source: python
    module: "ai.rag.query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  knowledge.ingest_docs:
    description: "Re-ingest reference documentation into RAG vector database"
    source: python
    module: "ai.rag.ingest_docs"
    args: null

  gaming.profiles:
    description: "List configured game profiles"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "list_profiles"
    args: null

  gaming.mangohud_preset:
    description: "Get MangoHud preset for a specific game"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "get_preset"
    args:
      game:
        type: string
        max_length: 100
        membership: steam_library
        required: true

  logs.health_trend:
    description: "Last 7 health snapshots with delta trends (temps, disk, RAM)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.scan_history:
    description: "Last 10 ClamAV scan results with threat details"
    source: python
    module: "ai.log_intel"
    args: null

  logs.anomalies:
    description: "Unacknowledged system anomalies (threats, temp spikes, disk issues)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.search:
    description: "Semantic search across all system logs"
    source: python
    module: "ai.log_intel"
    args:
      query:
        type: string
        max_length: 500
        required: true

  logs.stats:
    description: "Log pipeline statistics (record counts, last ingestion, DB size)"
    source: python
    module: "ai.log_intel"
    args: null

  system.llm_models:
    description: "List available LLM modes and their provider chains (reads live config)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.run_scan:
    description: "Trigger a ClamAV quick scan (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      scan_type:
        type: string
        pattern: "^(quick|deep)$"
        required: false

  security.run_health:
    description: "Trigger a system health snapshot (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.sandbox_submit:
    description: "Submit a quarantine file to Hybrid Analysis sandbox"
    source: python
    module: "ai.threat_intel.sandbox"
    args:
      file_path:
        type: string
        pattern: "^quarantine/"
        max_length: 256
        required: true

  security.cve_check:
    description: "Scan installed packages for CVEs (NVD / OSV / CISA KEV)"
    source: python
    module: "ai.threat_intel.cve_scanner"
    rate_limit: {per_tool: 1}
    args: null

  security.threat_summary:
    description: "Compile threat summary from all agent/scan report directories"
    source: python
    module: "ai.threat_intel.summary"
    args: null

  security.run_ingest:
    description: "Trigger log ingestion to update the intelligence database"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  code.search:
    description: "Search Python code in the repo by pattern (ripgrep/grep)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      query:
        type: string
        max_length: 128
        pattern: "^[\\w\\s.,?!:;'\"(){}\\[\\]@#$%^&*+=<>/|-]+$"
        required: true

  code.rag_query:
    description: "Semantic search over indexed Python code (embedding-based)"
    source: python
    module: "ai.rag.code_query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  system.mcp_manifest:
    description: "List all available MCP tools with descriptions and arguments"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.llm_status:
    description: "LLM routing status: provider health, token usage, active models"
    source: json_file
    path: "~/security/llm-status.json"
    args: null

  agents.security_audit:
    description: "Run automated security audit: scan + health + ingest + RAG summary"
    source: python
    module: "ai.agents.security_audit"
    function: "run_audit"
    args: null

  agents.performance_tuning:
    description: "Run performance analysis: temps, memory, disk, gaming profiles + recommendations"
    source: python
    module: "ai.agents.performance_tuning"
    function: "run_tuning"
    args: null

  agents.knowledge_storage:
    description: "Check vector DB health, ingestion freshness, disk usage, Ollama status"
    source: python
    module: "ai.agents.knowledge_storage"
    function: "run_storage_check"
    args: null

  agents.code_quality:
    description: "Run ruff + bandit + git status, report code quality and repo health"
    source: python
    module: "ai.agents.code_quality_agent"
    function: "run_code_check"
    args: null

  system.key_status:
    description: "API key presence check — which keys are set vs missing (never shows values)"
    source: json_file
    path: "~/security/key-status.json"
    args: null

  system.release_watch:
    description: "Check upstream releases for watched dependencies and tools"
    source: json_file
    path: "~/security/release-watch.json"
    args: null

  system.fedora_updates:
    description: "Fedora/Bazzite pending security and package updates"
    source: json_file
    path: "~/security/fedora-updates.json"
    args: null

  system.pkg_intel:
    description: "Package intelligence via deps.dev — advisories, provenance, version status"
    source: python
    module: ai.system.pkg_intel
    function: mcp_handler
    args: null

  system.gpu_perf:
    description: "NVIDIA GPU perf snapshot: temp, pstate, clocks, VRAM, throttle reasons, headroom"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.gpu_health:
    description: "NVIDIA GPU health diagnostic with throttle bit interpretation and trend logging"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null
