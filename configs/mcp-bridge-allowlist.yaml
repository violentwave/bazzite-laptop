# MCP Bridge Tool Allowlist
# Static tool definitions for the MCP bridge server.
# Unknown tool names are rejected at startup. No dynamic registration.
#
# Security model: all tools are read-only, no mutations.
# Arguments validated by regex/length/membership before execution.

tools:
  system.disk_usage:
    description: "Disk usage summary"
    command: ["df", "-h"]
    args: null

  system.cpu_temps:
    description: "CPU and sensor temperatures (JSON)"
    command: ["sensors", "-j"]
    args: null

  system.gpu_status:
    description: "NVIDIA GPU name, temperature, memory, power"
    command: ["nvidia-smi", "--query-gpu=name,temperature.gpu,utilization.gpu,memory.total,power.draw,fan.speed", "--format=csv,noheader,nounits"]
    args: null

  system.memory_usage:
    description: "System memory usage"
    command: ["free", "-h"]
    args: null

  system.uptime:
    description: "System uptime"
    command: ["uptime"]
    args: null

  system.service_status:
    description: "Status of security-related systemd services"
    command: ["systemctl", "show", "--property=Id,ActiveState", "clamav-freshclam", "system-health.timer", "bazzite-mcp-bridge.service", "bazzite-llm-proxy.service"]
    args: null

  security.last_scan:
    description: "Last 20 lines of latest ClamAV scan log"
    source: file_tail
    path: "/var/log/clamav-scans"
    pattern: "scan-*.log"
    lines: 20
    args: null

  security.health_snapshot:
    description: "Last 30 lines of latest health snapshot"
    source: file_tail
    path: "/var/log/system-health"
    pattern: "health-*.log"
    lines: 30
    args: null

  security.status:
    description: "Current security/health status (filtered JSON)"
    source: json_file
    path_key: STATUS_FILE
    allowed_keys:
      - state
      - scan_type
      - last_scan_time
      - result
      - health_status
      - health_issues
    args: null

  security.threat_lookup:
    description: "Look up a file hash in threat intel sources"
    source: python
    module: "ai.threat_intel.lookup"
    args:
      hash:
        type: string
        pattern: "^[a-fA-F0-9]{32,64}$"
        required: true

  security.ip_lookup:
    description: "IP reputation lookup (AbuseIPDB + GreyNoise + Shodan)"
    source: python
    module: "ai.threat_intel.ip_lookup"
    args:
      ip:
        type: string
        pattern: "^[0-9a-fA-F.:]+$"
        max_length: 45
        required: true

  security.url_lookup:
    description: "URL/IOC threat lookup (URLhaus + ThreatFox + CIRCL)"
    source: python
    module: "ai.threat_intel.ioc_lookup"
    args:
      url:
        type: string
        max_length: 2048
        required: true

  knowledge.rag_query:
    description: "Query the security knowledge base (embedding-only, no LLM)"
    source: python
    module: "ai.rag.query"
    args:
      query:
        type: string
        max_length: 500
        required: true

  knowledge.rag_qa:
    description: "Answer a question using the security knowledge base with LLM synthesis"
    source: python
    module: "ai.rag.query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  knowledge.ingest_docs:
    description: "Re-ingest reference documentation into RAG vector database"
    source: python
    module: "ai.rag.ingest_docs"
    args: null

  gaming.profiles:
    description: "List configured game profiles"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "list_profiles"
    args: null

  gaming.mangohud_preset:
    description: "Get MangoHud preset for a specific game"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "get_preset"
    args:
      game:
        type: string
        max_length: 100
        membership: steam_library
        required: true

  logs.health_trend:
    description: "Last 7 health snapshots with delta trends (temps, disk, RAM)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.scan_history:
    description: "Last 10 ClamAV scan results with threat details"
    source: python
    module: "ai.log_intel"
    args: null

  logs.anomalies:
    description: "Unacknowledged system anomalies (threats, temp spikes, disk issues)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.search:
    description: "Semantic search across all system logs"
    source: python
    module: "ai.log_intel"
    args:
      query:
        type: string
        max_length: 500
        required: true

  logs.stats:
    description: "Log pipeline statistics (record counts, last ingestion, DB size)"
    source: python
    module: "ai.log_intel"
    args: null

  system.llm_models:
    description: "List available LLM modes and their provider chains (reads live config)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.run_scan:
    description: "Trigger a ClamAV quick scan (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      scan_type:
        type: string
        pattern: "^(quick|deep)$"
        required: false

  security.run_health:
    description: "Trigger a system health snapshot (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.sandbox_submit:
    description: "Submit a quarantine file to Hybrid Analysis sandbox"
    source: python
    module: "ai.threat_intel.sandbox"
    args:
      file_path:
        type: string
        pattern: "^quarantine/"
        max_length: 256
        required: true

  security.cve_check:
    description: "Scan installed packages for CVEs (NVD / OSV / CISA KEV)"
    source: python
    module: "ai.threat_intel.cve_scanner"
    rate_limit: {per_tool: 1}
    args: null

  security.threat_summary:
    description: "Compile threat summary from all agent/scan report directories"
    source: python
    module: "ai.threat_intel.summary"
    args: null

  security.alert_summary:
    description: "Active security alerts: CVEs matching installed packages, stale scans, release advisories"
    source: json_file
    path: ~/security/alerts.json
    readOnly: true

  security.run_ingest:
    description: "Trigger log ingestion to update the intelligence database"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  # P84 Security Ops Center tools
  security.ops_overview:
    description: "Get security ops overview with summary counts and status"
    source: python
    module: "ai.security_service"
    function: "get_overview"
    readOnly: true
    args: null

  security.ops_alerts:
    description: "Get security alerts with optional severity filtering"
    source: python
    module: "ai.security_service"
    function: "get_alerts"
    readOnly: true
    args:
      severity:
        type: string
        pattern: "^(critical|high|medium|low|info)$"
        required: false
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  security.ops_findings:
    description: "Get recent scan findings"
    source: python
    module: "ai.security_service"
    function: "get_findings"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 50
        required: false

  security.ops_provider_health:
    description: "Get provider health issues and auth failures"
    source: python
    module: "ai.security_service"
    function: "get_provider_health_issues"
    readOnly: true
    args: null

  security.ops_acknowledge:
    description: "Acknowledge a security alert by ID"
    source: python
    module: "ai.security_service"
    function: "acknowledge_alert"
    destructive: true
    args:
      alert_id:
        type: string
        max_length: 64
        required: true

  # P121 Security Autopilot UI tools
  security.autopilot_overview:
    description: "Security Autopilot overview with queue, policy, and audit counts"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_overview"
    readOnly: true
    args: null

  security.autopilot_findings:
    description: "Normalized Security Autopilot findings"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_findings"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 200
        required: false

  security.autopilot_incidents:
    description: "Grouped Security Autopilot incidents"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_incidents"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  security.autopilot_evidence:
    description: "Redacted Security Autopilot evidence bundles"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_evidence"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  security.autopilot_audit:
    description: "Recent Security Autopilot audit events"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_audit_events"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 200
        required: false

  security.autopilot_policy:
    description: "Security Autopilot policy mode and controls"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_policy_status"
    readOnly: true
    args: null

  security.autopilot_remediation_queue:
    description: "Plan-only Security Autopilot remediation queue"
    source: python
    module: "ai.security_autopilot.ui_service"
    function: "get_autopilot_remediation_queue"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  # P85 Interactive Shell Gateway tools
  shell.create_session:
    description: "Create a new interactive shell session"
    source: python
    module: "ai.shell_service"
    function: "create_session"
    args:
      name:
        type: string
        max_length: 64
        required: false
      cwd:
        type: string
        max_length: 256
        required: false

  shell.list_sessions:
    description: "List all shell sessions"
    source: python
    module: "ai.shell_service"
    function: "list_sessions"
    readOnly: true
    args: null

  shell.get_session:
    description: "Get session details by ID"
    source: python
    module: "ai.shell_service"
    function: "get_session"
    readOnly: true
    args:
      session_id:
        type: string
        max_length: 16
        required: true

  shell.execute_command:
    description: "Execute a command in a shell session"
    source: python
    module: "ai.shell_service"
    function: "execute_command"
    destructive: true
    args:
      session_id:
        type: string
        max_length: 16
        required: true
      command:
        type: string
        max_length: 4096
        required: true

  shell.terminate_session:
    description: "Terminate a shell session"
    source: python
    module: "ai.shell_service"
    function: "terminate_session"
    destructive: true
    args:
      session_id:
        type: string
        max_length: 16
        required: true

  shell.get_context:
    description: "Get session context (user, cwd, shell, idle time)"
    source: python
    module: "ai.shell_service"
    function: "get_session_context"
    readOnly: true
    args:
      session_id:
        type: string
        max_length: 16
        required: true

  shell.get_audit_log:
    description: "Get shell audit log"
    source: python
    module: "ai.shell_service"
    function: "get_audit_log"
    readOnly: true
    args:
      session_id:
        type: string
        max_length: 16
        required: false
      limit:
        type: integer
        min: 1
        max: 500
        required: false

  # P86 — Project + Workflow + Phase Panels
  project.context:
    description: "Get complete project context (current phase, workflows, artifacts, recommendations)"
    source: python
    module: "ai.project_workflow_service"
    function: "get_project_context"
    readOnly: true
    args: null

  project.workflow_history:
    description: "Get workflow run history"
    source: python
    module: "ai.project_workflow_service"
    function: "get_workflow_history"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  project.phase_timeline:
    description: "Get phase timeline from documentation"
    source: python
    module: "ai.project_workflow_service"
    function: "get_phase_timeline"
    readOnly: true
    args: null

  project.artifacts:
    description: "Get recent artifacts"
    source: python
    module: "ai.project_workflow_service"
    function: "get_recent_artifacts"
    readOnly: true
    args:
      limit:
        type: integer
        min: 1
        max: 100
        required: false

  # P123 — Agent Workbench Core
  workbench.project_register:
    description: "Register a local project folder in Agent Workbench"
    source: python
    module: "ai.agent_workbench"
    args:
      path:
        type: string
        max_length: 512
        required: true
      name:
        type: string
        max_length: 120
        required: false
      description:
        type: string
        max_length: 300
        required: false
      tags:
        type: string
        max_length: 300
        required: false
      allow_non_project_dirs:
        type: boolean
        required: false

  workbench.project_list:
    description: "List registered workbench projects"
    source: python
    module: "ai.agent_workbench"
    readOnly: true
    args: null

  workbench.project_open:
    description: "Mark a registered workbench project as opened"
    source: python
    module: "ai.agent_workbench"
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: true

  workbench.project_status:
    description: "Get status metadata for a registered workbench project"
    source: python
    module: "ai.agent_workbench"
    readOnly: true
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: true

  workbench.session_create:
    description: "Create a controlled workbench agent session"
    source: python
    module: "ai.agent_workbench"
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: true
      backend:
        type: string
        pattern: "^(codex|opencode|claude-code|gemini-cli)$"
        required: true
      cwd:
        type: string
        max_length: 512
        required: false
      sandbox_profile:
        type: string
        pattern: "^(conservative|analysis)$"
        required: false
      lease_minutes:
        type: integer
        min: 1
        max: 1440
        required: false

  workbench.session_list:
    description: "List workbench sessions"
    source: python
    module: "ai.agent_workbench"
    readOnly: true
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: false
      status:
        type: string
        pattern: "^(active|stopped|expired)$"
        required: false

  workbench.session_get:
    description: "Get a workbench session by ID"
    source: python
    module: "ai.agent_workbench"
    readOnly: true
    args:
      session_id:
        type: string
        max_length: 64
        pattern: "^sess_[a-f0-9]{12}$"
        required: true

  workbench.session_stop:
    description: "Stop a workbench session"
    source: python
    module: "ai.agent_workbench"
    args:
      session_id:
        type: string
        max_length: 64
        pattern: "^sess_[a-f0-9]{12}$"
        required: true

  workbench.git_status:
    description: "Read-only git status summary for a registered workbench project"
    source: python
    module: "ai.agent_workbench"
    readOnly: true
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: true

  workbench.test_commands:
    description: "List or execute registered safe test commands for a project"
    source: python
    module: "ai.agent_workbench"
    args:
      project_id:
        type: string
        max_length: 64
        pattern: "^proj_[a-f0-9]{12}$"
        required: true
      command_name:
        type: string
        max_length: 64
        pattern: "^[a-zA-Z0-9_.-]+$"
        required: false
      execute:
        type: boolean
        required: false

  workbench.handoff_note:
    description: "Append a structured workbench handoff note"
    source: python
    module: "ai.agent_workbench"
    args:
      summary:
        type: string
        max_length: 500
        required: true
      artifacts:
        type: string
        max_length: 600
        required: false
      phase:
        type: string
        max_length: 24
        pattern: "^P[0-9]{1,3}$"
        required: false
      session_id:
        type: string
        max_length: 64
        pattern: "^sess_[a-f0-9]{12}$"
        required: false

  code.search:
    description: "Search Python code in the repo by pattern (ripgrep/grep)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      query:
        type: string
        max_length: 128
        pattern: "^[\\w\\s.,?!:;'\"(){}\\[\\]@#$%^&*+=<>/|-]+$"
        required: true

  code.rag_query:
    description: "Semantic search over indexed Python code (embedding-based)"
    source: python
    module: "ai.rag.code_query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  code.fused_context:
    description: "Unified code context across semantic, structural, and phase/task artifacts"
    source: python
    module: "ai.rag.code_query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  system.mcp_manifest:
    description: "List all available MCP tools with descriptions and arguments"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.llm_status:
    description: "LLM routing status: provider health, token usage, active models"
    source: json_file
    path: "~/security/llm-status.json"
    args: null

  agents.security_audit:
    description: "Run automated security audit: scan + health + ingest + RAG summary"
    source: python
    module: "ai.agents.security_audit"
    function: "run_audit"
    args: null

  agents.performance_tuning:
    description: "Run performance analysis: temps, memory, disk, gaming profiles + recommendations"
    source: python
    module: "ai.agents.performance_tuning"
    function: "run_tuning"
    args: null

  agents.knowledge_storage:
    description: "Check vector DB health, ingestion freshness, disk usage, Ollama status"
    source: python
    module: "ai.agents.knowledge_storage"
    function: "run_storage_check"
    args: null

  agents.code_quality:
    description: "Run ruff + bandit + git status, report code quality and repo health"
    source: python
    module: "ai.agents.code_quality_agent"
    function: "run_code_check"
    args: null

  agents.timer_health:
    description: "Validate all 16 systemd timers fired within expected windows. Returns per-timer status, stale list, and overall health (healthy/warning/critical)."
    source: python
    module: "ai.agents.timer_sentinel"
    function: "check_timers"
    args: null

  system.key_status:
    description: "API key presence check — which keys are set vs missing (never shows values)"
    source: json_file
    path: "~/security/key-status.json"
    args: null

  system.release_watch:
    description: "Check upstream releases for watched dependencies and tools"
    source: json_file
    path: "~/security/release-watch.json"
    args: null

  system.fedora_updates:
    description: "Fedora/Bazzite pending security and package updates"
    source: json_file
    path: "~/security/fedora-updates.json"
    args: null

  system.pkg_intel:
    description: "Package intelligence via deps.dev — advisories, provenance, version status"
    source: python
    module: ai.system.pkg_intel
    function: mcp_handler
    args: null

  system.gpu_perf:
    description: "NVIDIA GPU perf snapshot: temp, pstate, clocks, VRAM, throttle reasons, headroom"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.gpu_health:
    description: "NVIDIA GPU health diagnostic with throttle bit interpretation and trend logging"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.cache_stats:
    description: "LLM cache statistics: entries, size, hit rate"
    source: python
    module: ai.cache
    function: get_cache_stats
    args: null

  system.token_report:
    description: "Token usage and cost report from LLM proxy (freshness-aware)"
    source: python
    module: ai.mcp_bridge.tools
    args: null

  system.pipeline_status:
    description: "Log pipeline status: ingest/archive/retention health, pending files, table row counts"
    source: python
    module: ai.system.pipeline_status
    function: get_pipeline_status
    args: null

  system.budget_status:
    description: "Token budget usage across all tiers (security, scheduled, interactive, coding)"
    source: python
    module: ai.mcp_bridge.server
    function: handle_system_budget_status
    args: null

  system.metrics_summary:
    description: "Aggregate metrics for last 24h: cache hit rates, provider latencies, budget usage, tool errors"
    source: python
    module: ai.metrics
    function: query_summary
    args:
      hours:
        type: integer
        required: false
        default: 24
        description: "Hours of metrics to summarize (default: 24)"
      metric_type:
        type: string
        required: false
        description: "Filter by metric type: cache, budget, provider, tool, timer"

  memory.search:
    description: "Search conversation memories by semantic similarity"
    source: python
    module: ai.memory
    function: search_memories
    args:
      query:
        type: string
        required: true
        max_length: 500
        description: "Search query for memory retrieval"
      top_k:
        type: integer
        required: false
        default: 5
        description: "Number of memories to return"

  system.provider_status:
    description: "Per-provider health, latency, error rates, and routing scores"
    source: python
    module: ai.provider_intel
    function: get_status
    readOnly: true

  security.correlate:
    description: "Cross-reference an IOC across all threat intel sources. Pass ioc (the value) and ioc_type (hash|ip|url|cve)"
    source: python
    module: ai.mcp_bridge.tools
    args:
      ioc:
        type: string
        required: true
        max_length: 256
        description: "The IOC value — a hash, IP address, URL, or CVE ID"
      ioc_type:
        type: string
        required: true
        pattern: "^(hash|ip|url|cve)$"
        description: "Type of IOC: hash, ip, url, or cve"

  security.recommend_action:
    description: "Generate response playbook for a threat finding. Pass finding_type (cve|malware|suspicious_ip|suspicious_url) and finding_id"
    source: python
    module: ai.mcp_bridge.tools
    args:
      finding_type:
        type: string
        required: true
        pattern: "^(cve|malware|suspicious_ip|suspicious_url)$"
        description: "Type: cve, malware, suspicious_ip, or suspicious_url"
      finding_id:
        type: string
        required: true
        max_length: 256
        description: "The identifier — CVE ID, hash, IP, or URL"

  knowledge.pattern_search:
    description: "Semantic search over code patterns with optional language/domain/frontend metadata filters"
    source: python
    module: ai.rag.pattern_query
    args:
      query:
        type: string
        max_length: 500
        required: true
      language:
        type: string
        pattern: "^(python|rust|javascript|typescript|bash|c|yaml)$"
        required: false
      domain:
        type: string
        pattern: "^(security|networking|systems|data|web|testing|frontend)$"
        required: false
      archetype:
        type: string
        pattern: "^(landing-page|service-site|dashboard|portfolio|lead-gen)$"
        required: false
      pattern_scope:
        type: string
        pattern: "^(section|component|layout|motion|asset|token|workflow|media|effect)$"
        required: false
      semantic_role:
        type: string
