# MCP Bridge Tool Allowlist
# Static tool definitions for the MCP bridge server.
# Unknown tool names are rejected at startup. No dynamic registration.
#
# Security model: all tools are read-only, no mutations.
# Arguments validated by regex/length/membership before execution.

tools:
  system.disk_usage:
    description: "Disk usage summary"
    command: ["df", "-h"]
    args: null

  system.cpu_temps:
    description: "CPU and sensor temperatures (JSON)"
    command: ["sensors", "-j"]
    args: null

  system.gpu_status:
    description: "NVIDIA GPU name, temperature, memory, power"
    command: ["nvidia-smi", "--query-gpu=name,temperature.gpu,utilization.gpu,memory.total,power.draw,fan.speed", "--format=csv,noheader,nounits"]
    args: null

  system.memory_usage:
    description: "System memory usage"
    command: ["free", "-h"]
    args: null

  system.uptime:
    description: "System uptime"
    command: ["uptime"]
    args: null

  system.service_status:
    description: "Status of security-related systemd services"
    command: ["systemctl", "show", "--property=Id,ActiveState", "clamav-freshclam", "system-health.timer", "bazzite-mcp-bridge.service", "bazzite-llm-proxy.service"]
    args: null

  security.last_scan:
    description: "Last 20 lines of latest ClamAV scan log"
    source: file_tail
    path: "/var/log/clamav-scans"
    pattern: "scan-*.log"
    lines: 20
    args: null

  security.health_snapshot:
    description: "Last 30 lines of latest health snapshot"
    source: file_tail
    path: "/var/log/system-health"
    pattern: "health-*.log"
    lines: 30
    args: null

  security.status:
    description: "Current security/health status (filtered JSON)"
    source: json_file
    path_key: STATUS_FILE
    allowed_keys:
      - state
      - scan_type
      - last_scan_time
      - result
      - health_status
      - health_issues
    args: null

  security.threat_lookup:
    description: "Look up a file hash in threat intel sources"
    source: python
    module: "ai.threat_intel.lookup"
    args:
      hash:
        type: string
        pattern: "^[a-fA-F0-9]{32,64}$"
        required: true

  security.ip_lookup:
    description: "IP reputation lookup (AbuseIPDB + GreyNoise + Shodan)"
    source: python
    module: "ai.threat_intel.ip_lookup"
    args:
      ip:
        type: string
        pattern: "^[0-9a-fA-F.:]+$"
        max_length: 45
        required: true

  security.url_lookup:
    description: "URL/IOC threat lookup (URLhaus + ThreatFox + CIRCL)"
    source: python
    module: "ai.threat_intel.ioc_lookup"
    args:
      url:
        type: string
        max_length: 2048
        required: true

  knowledge.rag_query:
    description: "Query the security knowledge base (embedding-only, no LLM)"
    source: python
    module: "ai.rag.query"
    args:
      query:
        type: string
        max_length: 500
        required: true

  knowledge.rag_qa:
    description: "Answer a question using the security knowledge base with LLM synthesis"
    source: python
    module: "ai.rag.query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  knowledge.ingest_docs:
    description: "Re-ingest reference documentation into RAG vector database"
    source: python
    module: "ai.rag.ingest_docs"
    args: null

  gaming.profiles:
    description: "List configured game profiles"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "list_profiles"
    args: null

  gaming.mangohud_preset:
    description: "Get MangoHud preset for a specific game"
    source: python
    module: "ai.gaming.scopebuddy"
    function: "get_preset"
    args:
      game:
        type: string
        max_length: 100
        membership: steam_library
        required: true

  logs.health_trend:
    description: "Last 7 health snapshots with delta trends (temps, disk, RAM)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.scan_history:
    description: "Last 10 ClamAV scan results with threat details"
    source: python
    module: "ai.log_intel"
    args: null

  logs.anomalies:
    description: "Unacknowledged system anomalies (threats, temp spikes, disk issues)"
    source: python
    module: "ai.log_intel"
    args: null

  logs.search:
    description: "Semantic search across all system logs"
    source: python
    module: "ai.log_intel"
    args:
      query:
        type: string
        max_length: 500
        required: true

  logs.stats:
    description: "Log pipeline statistics (record counts, last ingestion, DB size)"
    source: python
    module: "ai.log_intel"
    args: null

  system.llm_models:
    description: "List available LLM modes and their provider chains (reads live config)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.run_scan:
    description: "Trigger a ClamAV quick scan (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      scan_type:
        type: string
        pattern: "^(quick|deep)$"
        required: false

  security.run_health:
    description: "Trigger a system health snapshot (runs in background via systemd)"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  security.sandbox_submit:
    description: "Submit a quarantine file to Hybrid Analysis sandbox"
    source: python
    module: "ai.threat_intel.sandbox"
    args:
      file_path:
        type: string
        pattern: "^quarantine/"
        max_length: 256
        required: true

  security.cve_check:
    description: "Scan installed packages for CVEs (NVD / OSV / CISA KEV)"
    source: python
    module: "ai.threat_intel.cve_scanner"
    rate_limit: {per_tool: 1}
    args: null

  security.threat_summary:
    description: "Compile threat summary from all agent/scan report directories"
    source: python
    module: "ai.threat_intel.summary"
    args: null

  security.alert_summary:
    description: "Active security alerts: CVEs matching installed packages, stale scans, release advisories"
    source: json_file
    path: ~/security/alerts.json
    readOnly: true

  security.run_ingest:
    description: "Trigger log ingestion to update the intelligence database"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  code.search:
    description: "Search Python code in the repo by pattern (ripgrep/grep)"
    source: python
    module: "ai.mcp_bridge.tools"
    args:
      query:
        type: string
        max_length: 128
        pattern: "^[\\w\\s.,?!:;'\"(){}\\[\\]@#$%^&*+=<>/|-]+$"
        required: true

  code.rag_query:
    description: "Semantic search over indexed Python code (embedding-based)"
    source: python
    module: "ai.rag.code_query"
    args:
      question:
        type: string
        max_length: 500
        pattern: "^[\\w\\s.,?!:;'\"()-]+$"
        required: true

  system.mcp_manifest:
    description: "List all available MCP tools with descriptions and arguments"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.llm_status:
    description: "LLM routing status: provider health, token usage, active models"
    source: json_file
    path: "~/security/llm-status.json"
    args: null

  agents.security_audit:
    description: "Run automated security audit: scan + health + ingest + RAG summary"
    source: python
    module: "ai.agents.security_audit"
    function: "run_audit"
    args: null

  agents.performance_tuning:
    description: "Run performance analysis: temps, memory, disk, gaming profiles + recommendations"
    source: python
    module: "ai.agents.performance_tuning"
    function: "run_tuning"
    args: null

  agents.knowledge_storage:
    description: "Check vector DB health, ingestion freshness, disk usage, Ollama status"
    source: python
    module: "ai.agents.knowledge_storage"
    function: "run_storage_check"
    args: null

  agents.code_quality:
    description: "Run ruff + bandit + git status, report code quality and repo health"
    source: python
    module: "ai.agents.code_quality_agent"
    function: "run_code_check"
    args: null

  agents.timer_health:
    description: "Validate all 16 systemd timers fired within expected windows. Returns per-timer status, stale list, and overall health (healthy/warning/critical)."
    source: python
    module: "ai.agents.timer_sentinel"
    function: "check_timers"
    args: null

  system.key_status:
    description: "API key presence check — which keys are set vs missing (never shows values)"
    source: json_file
    path: "~/security/key-status.json"
    args: null

  system.release_watch:
    description: "Check upstream releases for watched dependencies and tools"
    source: json_file
    path: "~/security/release-watch.json"
    args: null

  system.fedora_updates:
    description: "Fedora/Bazzite pending security and package updates"
    source: json_file
    path: "~/security/fedora-updates.json"
    args: null

  system.pkg_intel:
    description: "Package intelligence via deps.dev — advisories, provenance, version status"
    source: python
    module: ai.system.pkg_intel
    function: mcp_handler
    args: null

  system.gpu_perf:
    description: "NVIDIA GPU perf snapshot: temp, pstate, clocks, VRAM, throttle reasons, headroom"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.gpu_health:
    description: "NVIDIA GPU health diagnostic with throttle bit interpretation and trend logging"
    source: python
    module: "ai.mcp_bridge.tools"
    args: null

  system.cache_stats:
    description: "LLM cache statistics: entries, size, hit rate"
    source: python
    module: ai.cache
    function: get_cache_stats
    args: null

  system.token_report:
    description: "Token usage and cost report from LLM proxy (freshness-aware)"
    source: python
    module: ai.mcp_bridge.tools
    args: null

  system.pipeline_status:
    description: "Log pipeline status: ingest/archive/retention health, pending files, table row counts"
    source: python
    module: ai.system.pipeline_status
    function: get_pipeline_status
    args: null

  system.budget_status:
    description: "Token budget usage across all tiers (security, scheduled, interactive, coding)"
    source: python
    module: ai.mcp_bridge.server
    function: handle_system_budget_status
    args: null

  system.metrics_summary:
    description: "Aggregate metrics for last 24h: cache hit rates, provider latencies, budget usage, tool errors"
    source: python
    module: ai.metrics
    function: query_summary
    args:
      hours:
        type: integer
        required: false
        default: 24
        description: "Hours of metrics to summarize (default: 24)"
      metric_type:
        type: string
        required: false
        description: "Filter by metric type: cache, budget, provider, tool, timer"

  memory.search:
    description: "Search conversation memories by semantic similarity"
    source: python
    module: ai.memory
    function: search_memories
    args:
      query:
        type: string
        required: true
        max_length: 500
        description: "Search query for memory retrieval"
      top_k:
        type: integer
        required: false
        default: 5
        description: "Number of memories to return"

  system.provider_status:
    description: "Per-provider health, latency, error rates, and routing scores"
    source: python
    module: ai.provider_intel
    function: get_status
    readOnly: true

  security.correlate:
    description: "Cross-reference an IOC across all threat intel sources. Pass ioc (the value) and ioc_type (hash|ip|url|cve)"
    source: python
    module: ai.mcp_bridge.tools
    args:
      ioc:
        type: string
        required: true
        max_length: 256
        description: "The IOC value — a hash, IP address, URL, or CVE ID"
      ioc_type:
        type: string
        required: true
        pattern: "^(hash|ip|url|cve)$"
        description: "Type of IOC: hash, ip, url, or cve"

  security.recommend_action:
    description: "Generate response playbook for a threat finding. Pass finding_type (cve|malware|suspicious_ip|suspicious_url) and finding_id"
    source: python
    module: ai.mcp_bridge.tools
    args:
      finding_type:
        type: string
        required: true
        pattern: "^(cve|malware|suspicious_ip|suspicious_url)$"
        description: "Type: cve, malware, suspicious_ip, or suspicious_url"
      finding_id:
        type: string
        required: true
        max_length: 256
        description: "The identifier — CVE ID, hash, IP, or URL"

  knowledge.pattern_search:
    description: "Semantic search over code patterns (security, systems, testing) with optional language/domain filters"
    source: python
    module: ai.rag.pattern_query
    args:
      query:
        type: string
        max_length: 500
        required: true
      language:
        type: string
        pattern: "^(python|rust|javascript|bash|c|yaml)$"
        required: false
      domain:
        type: string
        pattern: "^(security|networking|systems|data|web|testing)$"
        required: false
      limit:
        type: integer
        default: 5
        required: false

  knowledge.task_patterns:
    description: "Retrieve similar past successful tasks"
    source: python
    module: ai.learning.task_logger
    function: retrieve_similar_tasks
    args:
      query:
        type: string
        max_length: 500
        required: true
      top_k:
        type: int
        default: 5
        max: 20
        required: false

  knowledge.session_history:
    description: "Search session history from HANDOFF.md entries"
    source: python
    module: ai.learning.handoff_parser
    function: parse_handoff
    args:
      query:
        type: string
        max_length: 500
        required: true
      limit:
        type: int
        default: 5
        max: 20
        required: false


  system.weekly_insights:
    description: "Get AI-generated weekly insights and recommendations based on system performance"
    source: python
    module: ai.insights
    function: get_latest_insights
    args:
      limit:
        type: integer
        default: 4
        required: false

  system.insights:
    description: "Generate on-demand AI layer insights: cache stats, provider latency, budget usage, recent memories"
    source: python
    module: ai.insights
    function: generate_on_demand
    readOnly: false
    args: null

  code.impact_analysis:
    description: "Analyze the impact of code changes on dependent modules and tests"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_impact_analysis
    args:
      changed_files:
        type: string
        max_length: 1000
        required: true
      include_tests:
        type: boolean
        default: true
        required: false
      max_depth:
        type: integer
        default: 3
        required: false

  code.dependency_graph:
    description: "Get the dependency graph for a module"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_dependency_graph
    args:
      module:
        type: string
        max_length: 100
        required: true
      direction:
        type: string
        pattern: "^(up|down|both)$"
        default: "both"
        required: false

  code.find_callers:
    description: "Find all functions that call a given function"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_find_callers
    args:
      function_name:
        type: string
        max_length: 100
        required: true
      include_indirect:
        type: boolean
        default: true
        required: false

  code.suggest_tests:
    description: "Suggest tests that cover the given changed files"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_suggest_tests
    args:
      changed_files:
        type: string
        max_length: 1000
        required: true

  code.complexity_report:
    description: "Get complexity report for code files or functions"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_complexity_report
    args:
      target:
        type: string
        max_length: 100
        required: false
      threshold:
        type: integer
        default: 10
        required: false

  code.class_hierarchy:
    description: "Get the class hierarchy for a given class"
    source: python
    module: ai.mcp_bridge.server
    function: handle_code_class_hierarchy
    args:
      class_name:
        type: string
        max_length: 100
        required: true

  collab.queue_status:
    description: "Get task queue status summary"
    source: python
    module: ai.collab.task_queue
    function: get_queue_status
    args: null

  collab.add_task:
    description: "Add a task to the collaborative queue"
    source: python
    module: ai.collab.task_queue
    function: add_task
    args:
      title:
        type: string
        max_length: 200
        required: true
      task_type:
        type: string
        pattern: "^(implement_feature|implement_mcp_tool|refactor_module|write_tests|fix_bug|audit_code|review_pr|update_docs|security_audit)$"
        required: true
      description:
        type: string
        max_length: 1000
        required: false
      priority:
        type: integer
        default: 3
        required: false

  collab.search_knowledge:
    description: "Search the agent knowledge base"
    source: python
    module: ai.collab.knowledge_base
    function: search_knowledge
    args:
      query:
        type: string
        max_length: 500
        required: true
      top_k:
        type: integer
        default: 5
        required: false

  workflow.run:
    description: "Execute a saved workflow or ad-hoc steps"
    source: python
    module: ai.workflows.runner
    function: execute_workflow
    args:
      workflow_id:
        type: string
        max_length: 100
        required: false
      steps:
        type: string
        max_length: 2000
        required: false

  workflow.list:
    description: "List available workflows"
    source: python
    module: ai.workflows.definitions
    function: list_workflows
    args: null

  system.create_tool:
    description: "Create a dynamic tool with safety validation"
    source: python
    module: ai.tools.builder
    function: create_tool
    args:
      name:
        type: string
        max_length: 100
        required: true
      description:
        type: string
        max_length: 500
        required: true
      handler_code:
        type: string
        max_length: 5000
        required: true
      parameters:
        type: string
        max_length: 1000
        required: false
      created_by:
        type: string
        max_length: 50
        default: "system"
        required: false

  system.list_dynamic_tools:
    description: "List all persisted dynamic tools"
    source: python
    module: ai.tools.builder
    function: list_dynamic_tools
    args: null

  system.alert_history:
    description: "Recent alert history"
    source: python
    module: ai.alerts.history
    function: get_recent
    args:
      limit:
        type: int
        default: 20
        max: 100

  system.alert_rules:
    description: "List all alert rules with enabled/cooldown status"
    source: python
    module: ai.alerts.rules
    function: get_all_rules
    args: null

  system.dep_audit:
    description: "Run dependency vulnerability audit or read latest cached result"
    source: python
    module: ai.system.depaudit
    function: get_latest_report
    args: null

  system.dep_audit_history:
    description: "List last 30 days of dependency audit reports"
    source: python
    module: ai.system.depaudit
    function: get_report_history
    args:
      limit:
        type: int
        default: 30
        max: 30

  intel.scrape_now:
    description: "Trigger intelligence scrape: GitHub releases, CISA KEV, NVD CVEs, Fedora RSS"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_intel_scrape_now
    annotations:
      readOnly: false
      destructive: false
      openWorld: false

  notion.search:
    description: "Search pages and databases in Notion"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_notion_search
    args:
      query:
        type: str
        required: false
        description: "Search query string"
        max_length: 500
      filter_type:
        type: str
        required: false
        description: "Filter by 'page' or 'database'"
        pattern: "^(page|database)?$"
        max_length: 10
      limit:
        type: int
        required: false
        description: "Maximum number of results"
        max_length: 100
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  notion.get_page:
    description: "Get a Notion page by ID"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_notion_get_page
    args:
      page_id:
        type: str
        required: true
        description: "Page ID (UUID format)"
        pattern: "^[0-9a-fA-F-]{36}$"
        max_length: 40
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  notion.get_page_content:
    description: "Get content blocks from a Notion page"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_notion_get_page_content
    args:
      page_id:
        type: str
        required: true
        description: "Page ID (UUID format)"
        pattern: "^[0-9a-fA-F-]{36}$"
        max_length: 40
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  notion.query_database:
    description: "Query a Notion database"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_notion_query_database
    args:
      database_id:
        type: str
        required: true
        description: "Database ID (UUID format)"
        pattern: "^[0-9a-fA-F-]{36}$"
        max_length: 40
      filter:
        type: str
        required: false
        description: "Filter object as JSON string"
        max_length: 1000
      limit:
        type: int
        required: false
        description: "Maximum number of results"
        max_length: 100
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  system.perf_profile:
    description: "Run performance profiler for LLM, MCP tools, file I/O, LanceDB, and system metrics"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_perf_profile
    args:
      skip:
        type: str
        required: false
        description: "Comma-separated components to skip (llm,mcp,file_io,lancedb,system)"
        max_length: 100
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  system.mcp_audit:
    description: "Audit MCP bridge tool allowlist for missing handlers and validation issues"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_mcp_audit
    args:
      tool_name:
        type: str
        required: false
        description: "Specific tool to validate (omit for full audit)"
        max_length: 100
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  intel.ingest_pending:
    description: "Ingest pending scraped intelligence into LanceDB RAG knowledge base"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_intel_ingest_pending
    args:
      intel_dir:
        type: str
        required: false
        description: "Path to intel directory (default: ~/security/intel)"
        max_length: 200
    annotations:
      readOnly: false
      destructive: false
      openWorld: false

  slack.list_channels:
    description: "List Slack channels in the workspace"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_slack_list_channels
    args:
      limit:
        type: int
        required: false
        description: "Maximum number of channels to return"
        max_length: 10
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  slack.list_users:
    description: "List Slack workspace users"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_slack_list_users
    args: null
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  slack.get_history:
    description: "Get message history from a Slack channel"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_slack_get_history
    args:
      channel:
        type: str
        required: true
        description: "Channel ID (e.g., C01234567)"
        max_length: 20
      limit:
        type: int
        required: false
        description: "Maximum number of messages"
        max_length: 10
    annotations:
      readOnly: true
      destructive: false
      openWorld: false

  slack.post_message:
    description: "Post a message to a Slack channel"
    source: python
    module: ai.mcp_bridge.tools
    function: handle_slack_post_message
    args:
      channel:
        type: str
        required: true
        description: "Channel ID (e.g., C01234567)"
        max_length: 20
      text:
        type: str
        required: true
        description: "Message text"
        max_length: 3000
      thread_ts:
