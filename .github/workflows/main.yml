name: Lint & Validate

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'HANDOFF.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'HANDOFF.md'
      - 'CHANGELOG.md'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on all scripts
        run: |
          shfiles=$(find scripts/ -name '*.sh' 2>/dev/null)
          if [ -z "$shfiles" ]; then
            echo "No .sh files found - skipping"
            exit 0
          fi
          echo "$shfiles" | xargs shellcheck

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash -n on all .sh files
        run: |
          FAIL=0
          shfiles=$(find scripts/ -name '*.sh' 2>/dev/null)
          if [ -z "$shfiles" ]; then
            echo "No .sh files found - skipping"
            exit 0
          fi
          for f in $shfiles; do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

  systemd:
    name: Systemd Unit Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate systemd units
        run: |
          FAIL=0
          for f in systemd/*.service systemd/*.timer; do
            [ -e "$f" ] || continue
            echo "Checking $f..."
            if [[ "$f" == *.service ]]; then
              grep -q '\[Service\]' "$f" || { echo "FAIL: $f missing [Service]"; FAIL=1; }
            fi
            if [[ "$f" == *.timer ]]; then
              grep -q '\[Timer\]' "$f" || { echo "FAIL: $f missing [Timer]"; FAIL=1; }
            fi
          done
          exit $FAIL

  python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Create venv and install deps
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements-ai.txt
      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check ai/ tests/
      - name: Bandit security scan
        run: |
          source .venv/bin/activate
          bandit -r ai/ -c pyproject.toml
      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          python -m pytest tests/ --ignore=tests/test_embedder.py -x --timeout=60 \
            --cov=ai --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70 -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Dependency audit
        run: |
          source .venv/bin/activate
          python -m pip_audit --format=json --output=security-audit.json || true

  desktop:
    name: Desktop Entry Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for desktop files
        id: check
        run: |
          count=$(find desktop/ -name '*.desktop' 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: Install desktop-file-utils
        if: steps.check.outputs.count != '0'
        run: sudo apt-get install -y desktop-file-utils
      - name: Validate .desktop files
        if: steps.check.outputs.count != '0'
        run: |
          FAIL=0
          for f in desktop/*.desktop; do
            [ -e "$f" ] || continue
            echo "Checking $f..."
            if ! desktop-file-validate "$f" 2>&1; then
              FAIL=1
            fi
          done
          exit $FAIL
      - name: No desktop files found
        if: steps.check.outputs.count == '0'
        run: echo "No .desktop files present - skipping validation"
