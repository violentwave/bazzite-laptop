name: Lint & Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on all scripts
        run: shellcheck scripts/*.sh

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash -n on all .sh files
        run: |
          FAIL=0
          for f in scripts/*.sh; do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          exit $FAIL

  systemd:
    name: Systemd Unit Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate systemd units
        run: |
          FAIL=0
          for f in systemd/*.service systemd/*.timer; do
            echo "Checking $f..."
            # Verify required sections exist
            if [[ "$f" == *.service ]]; then
              grep -q '\[Service\]' "$f" || { echo "FAIL: $f missing [Service]"; FAIL=1; }
            fi
            if [[ "$f" == *.timer ]]; then
              grep -q '\[Timer\]' "$f" || { echo "FAIL: $f missing [Timer]"; FAIL=1; }
            fi
          done
          exit $FAIL

  desktop:
    name: Desktop Entry Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install desktop-file-utils
        run: sudo apt-get install -y desktop-file-utils
      - name: Validate .desktop files
        run: |
          FAIL=0
          for f in desktop/*.desktop; do
            echo "Checking $f..."
            if ! desktop-file-validate "$f" 2>&1; then
              FAIL=1
            fi
          done
          exit $FAIL
