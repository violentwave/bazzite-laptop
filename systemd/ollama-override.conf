# Override for Ollama on Bazzite (immutable OS)
# /usr/share is read-only; redirect Ollama's home to a writable location.
#
# MANUAL STEP REQUIRED (run once after deploy):
#   sudo usermod -d /var/lib/ollama ollama
#   sudo mkdir -p /var/lib/ollama/models
#   sudo chown -R ollama:ollama /var/lib/ollama
#
# This ensures the ollama system user's HOME matches OLLAMA_HOME so that
# ~/.ollama paths resolve correctly even if code uses $HOME internally.
[Service]
Environment=HOME=/var/lib/ollama
Environment=OLLAMA_HOME=/var/lib/ollama
Environment=OLLAMA_MODELS=/var/lib/ollama/models
