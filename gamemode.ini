# GameMode advanced config for Acer Predator G3-571 (GTX 1060)
# Deploy to: /etc/gamemode.ini
# Renices game process, sets NVIDIA GPU to max performance, sends notifications.

[general]
renice=10

[gpu]
apply_gpu_optimisations=accept-responsibility
nv_powermizer_mode=1

[custom]
start=notify-send "GameMode" "Optimizations activated"
end=notify-send "GameMode" "Optimizations deactivated"
